# markdownlint config for config-doctor
# A pure-markdown Claude Code plugin — files use YAML frontmatter and HTML tags in agent descriptions.

default: true

# MD041: first line must be a top-level heading — disabled because all plugin files
# start with YAML front matter (---), not a heading.
MD041: false

# MD013: line length — disabled; agent description fields contain long prose and JSON examples.
MD013: false

# MD033: inline HTML — disabled; agent descriptions use <example> and <commentary> tags.
MD033: false

# MD024: duplicate headings — disabled; each file is standalone and may reuse heading names.
MD024: false
